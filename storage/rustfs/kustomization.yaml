apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rustfs


configMapGenerator:
- envs:
  - manifests/configs/conf.env
  name: rustfs-config
   
secretGenerator:
- envs:
  - manifests/secrets/conf.env
  name: rustfs-root-creds
  type: Opaque
  
resources:
- manifests/ingress.yaml
- manifests/sa.yaml
- manifests/sts.yaml
- manifests/svc-headless.yaml
- manifests/svc.yaml
  
images:
  - name: rustfs/rustfs
    newTag: 1.0.0-alpha.89
