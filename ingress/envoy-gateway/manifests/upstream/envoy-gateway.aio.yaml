# Source: gatewayhelm/templates/envoygatewaydeployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoygateway
  namespace: 'envoygatewaysystem'
  labels:
    controlplane: envoygateway
    helm.sh/chart: gatewayhelm1.7.1
    app.kubernetes.io/name: gatewayhelm
    app.kubernetes.io/instance: eg
    app.kubernetes.io/version: "v1.7.1"
    app.kubernetes.io/managedby: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      controlplane: envoygateway
      app.kubernetes.io/name: gatewayhelm
      app.kubernetes.io/instance: eg
  template:
    metadata:
      annotations:
        prometheus.io/port: "19001"
        prometheus.io/scrape: "true"
      labels:
        controlplane: envoygateway
        app.kubernetes.io/name: gatewayhelm
        app.kubernetes.io/instance: eg
    spec:
      containers:
       args:
         server
         configpath=/config/envoygateway.yaml
        env:
         name: ENVOY_GATEWAY_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
         name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
        image: docker.io/envoyproxy/gateway:v1.7.1
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: envoygateway
        ports:
         containerPort: 19001
          name: metrics
         name: webhook
          containerPort: 9443
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            memory: 1024Mi
          requests:
            cpu: 300m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
             ALL
          privileged: false
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
         mountPath: /config
          name: envoygatewayconfig
          readOnly: true
         mountPath: /certs
          name: certs
          readOnly: true
      imagePullSecrets: []
      serviceAccountName: envoygateway
      terminationGracePeriodSeconds: 10
      volumes:
       configMap:
          defaultMode: 420
          name: envoygatewayconfig
        name: envoygatewayconfig
       name: certs
        secret:
          secretName: envoygateway

