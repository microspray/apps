# Source: gatewayhelm/templates/certgen.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: eggatewayhelmcertgen
  namespace: 'envoygatewaysystem'
  labels:
    helm.sh/chart: gatewayhelm1.7.1
    app.kubernetes.io/name: gatewayhelm
    app.kubernetes.io/instance: eg
    app.kubernetes.io/version: "v1.7.1"
    app.kubernetes.io/managedby: Helm
  annotations:
    "helm.sh/hook": preinstall, preupgrade
spec:
  backoffLimit: 1
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: certgen
    spec:
      containers:
       command:
         envoygateway
         certgen
        env:
         name: ENVOY_GATEWAY_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
         name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
        image: docker.io/envoyproxy/gateway:v1.7.1
        imagePullPolicy: IfNotPresent
        name: envoygatewaycertgen
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
             ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
          seccompProfile:
            type: RuntimeDefault
      imagePullSecrets: []
      restartPolicy: Never
      serviceAccountName: eggatewayhelmcertgen
  ttlSecondsAfterFinished: 30

