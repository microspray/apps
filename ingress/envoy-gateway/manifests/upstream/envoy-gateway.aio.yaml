apiVersion: v1
kind: ConfigMap
metadata:
  name: envoygatewayconfig
  namespace: 'envoygatewaysystem'
  labels:
    helm.sh/chart: gatewayhelm1.7.1
    app.kubernetes.io/name: gatewayhelm
    app.kubernetes.io/instance: eg
    app.kubernetes.io/version: "v1.7.1"
    app.kubernetes.io/managedby: Helm
data:
  envoygateway.yaml: |
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyGateway
    admin:
      address:
        host: 0.0.0.0
        port: 19000
      enableDumpConfig: true
      enablePprof: true
    envoyProxy:
      telemetry:
        accessLog:
          settings:
           format:
              text: '[%START_TIME%] "%REQ(:METHOD)% %REQ(XENVOYORIGINALPATH?:PATH)%
                %PROTOCOL%" %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_RECEIVED% %BYTES_SENT%
                %DURATION% %RESP(XENVOYUPSTREAMSERVICETIME)% "%REQ(XFORWARDEDFOR)%"
                "%REQ(USERAGENT)%" "%REQ(XREQUESTID)%" "%REQ(:AUTHORITY)%" "%UPSTREAM_HOST%"\n'
              type: Text
        metrics:
          prometheus:
            disable: false
    extensionApis:
      disableLua: false
      enableBackend: true
      enableEnvoyPatchPolicy: true
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclasscontroller
    logging:
      level:
        default: info
    provider:
      kubernetes:
        rateLimitDeployment:
          container:
            image: docker.io/envoyproxy/ratelimit:c8765e89
          patch:
            type: StrategicMerge
            value:
              spec:
                template:
                  spec:
                    containers:
                     imagePullPolicy: IfNotPresent
                      name: envoyratelimit
        shutdownManager:
          image: docker.io/envoyproxy/gateway:v1.7.1
      type: Kubernetes
    telemetry:
      metrics:
        prometheus:
          disable: false

