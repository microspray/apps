# batteries-values.yaml
# Helm values for deploying a "batteries included" Envoy Gateway
# helm upgrade -i eg envoy-gateway/envoy-gateway -n envoy-gateway-system -f batteries-values.yaml

deployment:
  envoyGateway:
    imagePullPolicy: IfNotPresent
    resources:
      limits:
        memory: 1024Mi
      requests:
        cpu: 300m
        memory: 256Mi
  # Expose internal ports for metrics and pprof/admin
  ports:
    - name: metrics
      port: 19001
      targetPort: 19001
  pod:
    annotations:
      prometheus.io/scrape: 'true'
      prometheus.io/port: '19001'

# -----------------------------------------------------------------------------
# Control Plane ServiceMonitor (For your kube-prometheus stack)
# -----------------------------------------------------------------------------
metrics:
  prometheus:
    serviceMonitor:
      enabled: true
      # Set this to the namespace where your prometheus looks for ServiceMonitors, 
      # or leave it as envoy-gateway-system if Prometheus watches all namespaces.
      namespace: "envoy-gateway-system"

# -----------------------------------------------------------------------------
# EnvoyGateway API Configuration (The core "Batteries Included" engine)
# -----------------------------------------------------------------------------
config:
  envoyGateway:
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
    provider:
      type: Kubernetes
    
    # Enable Admin Interface for Deep Debugging (pprof, config dumps)
    admin:
      address:
        host: "0.0.0.0"
        port: 19000
      enableDumpConfig: true
      enablePprof: true

    logging:
      level:
        default: info

    # Control Plane Telemetry
    telemetry:
      metrics:
        prometheus:
          disable: false

    # Enable advanced/experimental routing features
    extensionApis:
      enableBackend: true          # Enables routing to Unix Sockets & external FQDNs
      enableEnvoyPatchPolicy: true # Enables raw xDS Envoy config patching (for edge-cases)
      disableLua: false            # Ensures Lua scripting is available on the gateway

    # -------------------------------------------------------------------------
    # Global EnvoyProxy Defaults
    # This acts as the baseline configuration for all data-plane proxies 
    # created by Envoy Gateway, giving you rich logs and metrics out of the box.
    # -------------------------------------------------------------------------
    envoyProxy:
      telemetry:
        metrics:
          prometheus:
            disable: false
        accessLog:
          settings:
            # Rich Nginx-like access logging + Envoy upstream durations
            - format:
                type: Text
                text: '[%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%" %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_RECEIVED% %BYTES_SENT% %DURATION% %RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)% "%REQ(X-FORWARDED-FOR)%" "%REQ(USER-AGENT)%" "%REQ(X-REQUEST-ID)%" "%REQ(:AUTHORITY)%" "%UPSTREAM_HOST%"\n'

# Make sure topology injector is enabled so Envoy Gateway can track node proximity
topologyInjector:
  enabled: true
