apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.3/manifests/ha/install.yaml
- manifests/argocd.ingress.yaml
- manifests/servicemonitors.yaml
- manifests/sa.yaml

images:
- name: quay.io/argoproj/argocd
  newTag: v3.3.3
- name: quay.io/ant31/argocd-plugin
  newTag: latest

patches:
- path: manifests/patches/argocd-server.deploy.yaml
  target:
    group: apps
    kind: Deployment
    name: argocd-server
    version: v1
- path: manifests/patches/argocd-repo-server.deploy.yaml
  target:
    group: apps
    kind: Deployment
    name: argocd-repo-server
    version: v1



configMapGenerator:
- files:
  - plugin.yaml=manifests/configs/gitcrypt.plugin.yaml
  name: argocd-kustomize-gcrypt-plugin
  behavior: create
  options:
    disableNameSuffixHash: true

- files:
  - plugin.yaml=manifests/configs/sops.plugin.yaml
  name: argocd-sops-plugin
  behavior: create
  options:
    disableNameSuffixHash: true

- behavior: merge
  envs:
    - manifests/configs/argocd-cm.env.conf
  files:
  - oidc.config=manifests/secrets/oidc.config
  - resource.customizations.health.argoproj.io_Application=manifests/configs/health/application.lua
  - resource.customizations.health.networking.k8s.io_Ingress=manifests/configs/health/ingress.lua
  - resource.customizations.health.cert-manager.io_Certificate=manifests/configs/health/certificate.lua
  - repositories=manifests/configs/repositories.yaml
  - repository.credentials=manifests/configs/repo-credentials.yaml
  name: argocd-cm
- behavior: merge
  files:
  - manifests/configs/rbac/policy.csv
  literals:
  - policy.default=role:readonly
  name: argocd-rbac-cm

secretGenerator:
- envs:
  - manifests/secrets/oidc-client.env.conf
  name: argocd-oidc-secret
  options:
    disableNameSuffixHash: true
  type: Opaque

- files:
  - manifests/secrets/gitcrypt.key
  name: git-crypt-dev-key
  options:
    disableNameSuffixHash: true
  type: Opaque

- envs:
  - manifests/secrets/repo-creds.conf
  name: repo-creds
  options:
    disableNameSuffixHash: true
    labels:
      argocd.argoproj.io/secret-type: repo-creds
  type: Opaque

- envs:
  - manifests/secrets/aws-kms.env.conf
  name: aws-kms-credentials
  options:
    disableNameSuffixHash: true
  type: Opaque

